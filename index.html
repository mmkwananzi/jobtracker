<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GagisaPRO Job Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header>
        <h1>GagisaPRO Job Tracker</h1>
        <div class="header-actions">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search applications...">
            </div>
            <select id="filterStatus">
                <option value="">All Statuses</option>
                <option value="Bookmarked">Bookmarked</option>
                <option value="Applied">Applied</option>
                <option value="Unsuccessful">Unsuccessful</option>
                <option value="Phone Screen">Phone Screen</option>
                <option value="Interview">Interview</option>
                <option value="Technical Assessment">Technical Assessment</option>
                <option value="Final Round">Final Round</option>
                <option value="Offer">Offer</option>
                <option value="Accepted">Accepted</option>
                <option value="Rejected">Rejected</option>
                <option value="Withdrawn">Withdrawn</option>
            </select>
            <button id="exportBtn" class="btn btn-secondary" title="Export to CSV">Export CSV</button>
            <button id="addBtn" class="btn btn-primary">+ Add Application</button>
        </div>
    </header>

    <main>
        <div class="stats-bar" id="statsBar"></div>
        <div class="table-container">
            <table id="applicationsTable">
                <thead>
                    <tr>
                        <th data-sort="company">Company <span class="sort-icon"></span></th>
                        <th data-sort="jobTitle">Job Title <span class="sort-icon"></span></th>
                        <th data-sort="location">Location <span class="sort-icon"></span></th>
                        <th data-sort="status">Status <span class="sort-icon"></span></th>
                        <th data-sort="dateApplied">Date Applied <span class="sort-icon"></span></th>
                        <th data-sort="followUpDate">Follow-up <span class="sort-icon"></span></th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div id="emptyState" class="empty-state">
                <p>No applications yet. Click <strong>+ Add Application</strong> to get started.</p>
            </div>
        </div>
    </main>

    <!-- Modal for Add/Edit -->
    <div id="modal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Add Application</h2>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <form id="appForm">
                <input type="hidden" id="appId">

                <div class="form-grid">
                    <div class="form-group">
                        <label for="company">Company *</label>
                        <input type="text" id="company" required>
                    </div>
                    <div class="form-group">
                        <label for="jobTitle">Job Title *</label>
                        <input type="text" id="jobTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="locationType">Location Type</label>
                        <select id="locationType">
                            <option value="">Select...</option>
                            <option value="Remote">Remote</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="On-site">On-site</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location">City / Region</label>
                        <input type="text" id="location" placeholder="e.g. London, UK">
                    </div>
                    <div class="form-group">
                        <label for="salaryRange">Salary Range</label>
                        <input type="text" id="salaryRange" placeholder="e.g. £50,000 - £70,000">
                    </div>
                    <div class="form-group">
                        <label for="source">Source</label>
                        <select id="source">
                            <option value="">Select...</option>
                            <option value="LinkedIn">LinkedIn</option>
                            <option value="Indeed">Indeed</option>
                            <option value="Company Website">Company Website</option>
                            <option value="Referral">Referral</option>
                            <option value="Recruiter">Recruiter</option>
                            <option value="Job Board">Job Board</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="contactPerson">Contact Person</label>
                        <input type="text" id="contactPerson" placeholder="Recruiter / Hiring Manager">
                    </div>
                    <div class="form-group">
                        <label for="contactEmail">Contact Email</label>
                        <input type="email" id="contactEmail">
                    </div>
                    <div class="form-group">
                        <label for="resumeVersion">Resume Version</label>
                        <input type="text" id="resumeVersion" placeholder="e.g. v3 - Data Science">
                    </div>
                    <div class="form-group">
                        <label for="status">Status *</label>
                        <select id="status" required>
                            <option value="Bookmarked">Bookmarked</option>
                            <option value="Applied">Applied</option>
                            <option value="Unsuccessful">Unsuccessful</option>
                            <option value="Phone Screen">Phone Screen</option>
                            <option value="Interview">Interview</option>
                            <option value="Technical Assessment">Technical Assessment</option>
                            <option value="Final Round">Final Round</option>
                            <option value="Offer">Offer</option>
                            <option value="Accepted">Accepted</option>
                            <option value="Rejected">Rejected</option>
                            <option value="Withdrawn">Withdrawn</option>
                        </select>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Important Dates</h3>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="dateFound">Date Found</label>
                            <input type="date" id="dateFound">
                        </div>
                        <div class="form-group">
                            <label for="dateApplied">Date Applied</label>
                            <input type="date" id="dateApplied">
                        </div>
                        <div class="form-group">
                            <label for="deadline">Application Deadline</label>
                            <input type="date" id="deadline">
                        </div>
                        <div class="form-group">
                            <label for="followUpDate">Follow-up Date</label>
                            <input type="date" id="followUpDate">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="jobUrl">Job Advert URL</label>
                    <input type="url" id="jobUrl" placeholder="https://...">
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" rows="4"
                        placeholder="Interview prep, key requirements, things to mention..."></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Save Application</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Detail View Modal -->
    <div id="detailModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 id="detailTitle">Application Details</h2>
                <button class="modal-close" id="detailClose">&times;</button>
            </div>
            <div id="detailContent" class="detail-content"></div>
            <div class="form-actions">
                <button class="btn btn-secondary" id="detailCloseBtn">Close</button>
                <button class="btn btn-primary" id="detailEditBtn">Edit</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation -->
    <div id="deleteModal" class="modal-overlay hidden">
        <div class="modal modal-small">
            <div class="modal-header">
                <h2>Delete Application</h2>
            </div>
            <p>Are you sure you want to delete this application? This cannot be undone.</p>
            <div class="form-actions">
                <button class="btn btn-secondary" id="deleteCancelBtn">Cancel</button>
                <button class="btn btn-danger" id="deleteConfirmBtn">Delete</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
